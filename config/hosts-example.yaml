# WeTTY + MCP 智能终端服务 - 主机资产配置
#
# 使用方法：
#   1. 复制本文件为 hosts.yaml:  cp hosts-example.yaml hosts.yaml
#   2. 按实际环境修改主机信息
#   3. hosts.yaml 已被 .gitignore 忽略，不会提交到仓库（含敏感凭据）
#
# 本文件是主机配置的 Single Source of Truth（唯一真相）
# 数据库是运行时缓存，所有变更以本文件为准
#
# 同步机制：
#   1. 启动时自动同步到数据库
#   2. 运行中修改 hosts.yaml 会自动热加载（watchfiles 监听 + 2s 防抖）
#   3. 也可通过 POST /api/hosts/sync 手动触发同步
#
# 同步规则：
#   - 本文件中有、DB 中无 → 新增
#   - 本文件中有、DB 中有且字段变化 → 更新
#   - 本文件中无、DB 中有 → 删除
#   - 校验先行：任何一条格式错误则整批拒绝
#
# 字段说明：
#   name          - 主机别名（唯一标识，用于 MCP 工具和 URL 路径）
#   hostname      - 主机地址（IP 或域名）
#   port          - SSH 端口（默认 22）
#   username      - SSH 用户名
#   auth_type     - 认证方式：key（密钥）| password（密码）
#   private_key_path - SSH 私钥路径（auth_type: key 时必填）
#   password      - SSH 密码（auth_type: password 时必填，存储时自动加密）
#   description   - 主机描述（可选）
#   tags          - 标签列表（可选，用于分类筛选）
#
# 堡垒机扩展字段（type: bastion 时使用）：
#   type          - 主机类型：direct（直连，默认）| bastion（堡垒机）
#   ready_pattern - 堡垒机就绪检测正则（登录后出现的标志性文本）
#   login_success_pattern - 二级主机登录成功正则（用于检测跳转成功）
#   jump_hosts    - 二级主机列表（通过堡垒机跳转的目标主机）
#
# 二级主机字段（jump_hosts 列表中的每一项）：
#   name          - 二级主机别名（全局唯一，可直接用于 connect_host）
#   target_ip     - 目标主机 IP（在堡垒机中输入的地址）
#   description   - 描述（可选）
#   password      - 目标主机密码（可选，用于 login_steps 中的 {{password}} 替换）
#   login_steps   - 登录交互步骤链（可选，为空则输入 IP 后直接等待登录成功）
#     - wait      - 等待出现的正则模式
#       send      - 匹配后发送的内容（支持 {{password}} 变量替换）

hosts:
  # ── 密钥认证示例（推荐） ──────────────────────
  - name: dev-server
    hostname: 192.168.1.100
    port: 22
    username: deploy
    auth_type: key
    private_key_path: ~/.ssh/id_rsa
    description: 开发环境服务器
    tags:
      - dev
      - linux

  # ── 密码认证示例 ──────────────────────────────
  - name: prod-server
    hostname: 10.0.0.50
    port: 22
    username: admin
    auth_type: password
    password: "your-password-here"    # 启动时自动加密存储
    description: 生产环境服务器
    tags:
      - prod
      - linux

