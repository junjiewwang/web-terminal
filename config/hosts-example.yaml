# WeTTY + MCP 智能终端服务 - 主机资产配置示例
#
# 使用方法：
#   1. 复制本文件为 hosts.yaml:  cp config/hosts-example.yaml config/hosts.yaml
#   2. 按实际环境修改主机信息
#   3. hosts.yaml 已被 .gitignore 忽略，不会提交到仓库（含敏感凭据）
#
# 当前模型：
#   - 顶层 hosts 为 root 节点：负责建立首跳 SSH 连接
#   - children 为递归子节点：描述从父节点进入当前节点的方式
#   - entry.type 支持：menu_send | ssh_command
#   - entry.success_pattern 用于判断本跳是否已进入成功
#   - entry.steps 用于处理登录后的附加交互（密码、MFA、菜单确认等）
#
# one-key 密码方案（当前推荐写法）：
#   1. 在目标节点配置 entry_password
#   2. 在 entry.steps 中引用 {{password}}
#   3. 建议配合 YAML anchor 复用常见密码步骤，做到“写一次，到处引用”
#
# 运行时行为：
#   - entry_password / password 会在入库时自动加密
#   - {{password}} 在连接编排时会自动替换为当前节点的 entry_password
#   - {{manual}} 表示遇到该步骤时暂停，转为人工输入
#
# 同步机制：
#   1. 启动时自动同步到数据库
#   2. 运行中修改 hosts.yaml 会自动热加载（watchfiles 监听 + 2s 防抖）
#   3. 也可通过 POST /api/hosts/sync 手动触发同步

one_key_templates:
  password_step: &password_step
    wait: "[Pp]assword:"
    send: "{{password}}"

  sudo_password_step: &sudo_password_step
    wait: '\[sudo\] password for .*:|[Pp]assword:'
    send: "{{password}}"

  manual_mfa_step: &manual_mfa_step
    wait: "Verification code|MFA token|动态口令"
    send: "{{manual}}"

hosts:
  # ── 根节点：密钥认证示例（推荐） ──────────────────────
  - name: dev-server
    hostname: 192.168.1.100
    port: 22
    username: deploy
    auth_type: key
    private_key_path: ~/.ssh/id_rsa
    description: 开发环境服务器
    tags:
      - dev
      - linux
    ready_pattern: "[\\$#>%]\\s*$"

  # ── 根节点：密码认证示例 ──────────────────────────────
  - name: prod-server
    hostname: 10.0.0.50
    port: 22
    username: admin
    auth_type: password
    password: "replace-with-root-password"
    description: 生产环境服务器
    tags:
      - prod
      - linux
    ready_pattern: "[\\$#>]\\s*$"

  # ── 多跳示例：堡垒机 -> 子机 -> 再 ssh 到 root（one-key 密码） ─────
  - name: bastion
    hostname: bastion.example.com
    port: 36000
    username: operator
    auth_type: password
    password: "replace-with-bastion-password"
    description: 堡垒机
    tags:
      - bastion
      - prod
    ready_pattern: "\\[Host\\]>|Opt>"
    children:
      - name: prod-app
        description: 通过堡垒机菜单进入生产应用机
        ready_pattern: "Last login|\\]#|\\]\\$|[\\$#>]\\s*$"
        entry:
          type: menu_send
          value: "10.10.16.3"
          success_pattern: "Last login|\\]#|\\]\\$|[\\$#>]\\s*$"

      - name: prod-root-hop
        description: 在堡垒机里直接 ssh 到 root 机器（需要密码）
        ready_pattern: "Last login|[\\$#>]\\s*$"
        entry_password: "replace-with-hop-password"
        entry:
          type: ssh_command
          value: "ssh root@10.10.3.5 -p 36000"
          success_pattern: "Last login|[\\$#>]\\s*$"
          steps:
            - *password_step

      - name: prod-root-hop-with-mfa
        description: 需要密码 + MFA 的多跳登录示例
        ready_pattern: "Last login|[\\$#>]\\s*$"
        entry_password: "replace-with-hop-password"
        entry:
          type: ssh_command
          value: "ssh root@10.10.3.6 -p 36000"
          success_pattern: "Last login|[\\$#>]\\s*$"
          steps:
            - *password_step
            - *manual_mfa_step

      - name: sudo-after-login
        description: 登录后还需要执行 sudo 并再次输入密码
        ready_pattern: "root@host:~#|[\\$#>]\\s*$"
        entry_password: "replace-with-sudo-password"
        entry:
          type: ssh_command
          value: "ssh ops@10.10.3.8 -p 22"
          success_pattern: "ops@.*[\\$#>]\\s*$"
          steps:
            - *password_step
            - wait: "ops@.*[\\$#>]\\s*$"
              send: "sudo -i"
            - *sudo_password_step

# 说明：
#   - 如果某个 nested 节点只需要“命令 + 自动输密码”，最小配置就是：
#       entry_password + entry.value + steps: [*password_step]
#   - 如果密码提示语不同，可单独覆写 wait
#   - 如果无需自动输入密码，则不配 entry_password / steps 即可
