# ══════════════════════════════════════════════════════════════
# nginx 反向代理配置
#
# 架构：浏览器 → nginx(:8000) → uvicorn(:8001)
#
# 核心作用：解决浏览器 HTTP/1.1 SSE 长连接阻塞 POST 请求的问题。
#
# 问题背景：
#   浏览器对同一域名的 HTTP/1.1 并发 TCP 连接数有限（Chrome ~6 个）。
#   SSE streaming 响应会永久占用 TCP 连接（streaming 期间连接无法复用）。
#   当所有连接槽位被 SSE/pending 请求占满后，新的 POST 请求会被浏览器
#   排队等待，导致 POST 永远 pending。
#
# nginx 如何解决：
#   nginx 与 uvicorn 之间使用独立的内部连接池（keepalive），
#   浏览器的 SSE 连接只占用 nginx ↔ 浏览器 的连接，
#   不影响 nginx ↔ uvicorn 的内部连接。
#   浏览器发 POST 时，nginx 可以使用空闲的内部连接转发给 uvicorn，
#   完全绕开了浏览器连接槽位被 SSE 占满的问题。
# ══════════════════════════════════════════════════════════════

upstream uvicorn {
    server 127.0.0.1:8001;
    keepalive 16;
}

# WebSocket 条件升级映射
#
# 当客户端发送 Upgrade: websocket 请求头时，$http_upgrade = "websocket"，
# 此时 $connection_upgrade = "upgrade"，触发协议升级。
# 当客户端发送普通 HTTP 请求时，$http_upgrade 为空，
# 此时 $connection_upgrade = "close"，不破坏 upstream keepalive 连接复用。
#
# 为什么不能硬编码 Connection "upgrade"：
#   socket.io 先通过 HTTP 长轮询建立连接，再升级到 WebSocket。
#   如果对 HTTP 轮询请求也发送 Connection: upgrade，
#   upstream（uvicorn/WeTTY）会返回 400 Bad Request。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8000;
    server_name localhost;

    root /app/static;
    index index.html;

    # 健康检查端点
    location = /health {
        proxy_pass http://uvicorn;
        proxy_set_header Host $host;
    }

    # 前端路由 - SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE 事件流（需要禁用缓冲，放在 /api/ 之前确保优先匹配）
    location /api/events/ {
        proxy_pass http://uvicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        # SSE 长连接超时（24 小时）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://uvicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }

    # MCP Streamable HTTP 端点
    # 注意：必须使用 $http_host（含端口号）而非 $host（不含端口号），
    # 否则 MCP transport security 的 DNS rebinding protection 会拒绝请求（421）。
    # 原因：MCP 默认 allowed_hosts = ["localhost:*"] 使用 fnmatch 匹配，
    # "localhost:*" 不匹配纯 "localhost"，但匹配 "localhost:8000"。
    location /mcp/ {
        proxy_pass http://uvicorn;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
    }

    # WeTTY 终端反向代理（HTTP + WebSocket）
    # WeTTY 实例动态绑定不同端口，由 uvicorn 内的 wetty_proxy 模块转发
    #
    # socket.io 协议流程：
    #   1. HTTP 长轮询握手 → 获取 sid + upgrades:["websocket"]
    #   2. WebSocket Upgrade 请求 → 协议升级
    #   3. 双向 WebSocket 数据流（xterm.js 终端 I/O）
    #
    # 必须使用 $connection_upgrade 条件变量（非硬编码 "upgrade"），
    # 否则步骤 1 的 HTTP 轮询也会被强制设置 Connection: upgrade 头，
    # 导致 upstream 返回 400 Bad Request。
    location /wetty/ {
        proxy_pass http://uvicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket 条件升级
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 终端长连接超时（24 小时）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
